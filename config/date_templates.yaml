  - id: pre_theatre_dinner_and_show
    title: Pre-theatre dinner and a show
    vibe: [romantic, nerdy]
    time_of_day: evening
    duration_hours: 4
    meaningful_variations: 14
    weather_sensitive: false
    description: Early dinner, then a performance — theatre, ballet, symphony, whatever's playing.
    stops:
      - type: restaurant
      - type: performing_arts_venue

  - id: wharf_show_and_harbour_dessert
    title: Wharf show and harbour dessert
    vibe: [romantic, nerdy]
    time_of_day: evening
    duration_hours: 3.5
    meaningful_variations: 3
    weather_sensitive: true
    description: See a performance near the water, walk through the harbour lights, then finish somewhere sweet.
    stops:
      - type: performing_arts_venue
      - type: harbor_or_pier
        kind: connective
        note: short harbour walk after the show
      - type: dessert_shop

  - id: dinner_and_a_movie
    title: Dinner and a movie
    vibe: [casual, romantic]
    time_of_day: evening
    duration_hours: 4
    meaningful_variations: 18
    weather_sensitive: false
    description: Casual dinner, then a cinema — old-school for a reason.
    stops:
      - type: casual_restaurant
      - type: movie_theater

  - id: wine_bar_and_shared_plates
    title: Wine bar and shared plates
    vibe: [romantic, foodie]
    time_of_day: evening
    duration_hours: 3
    meaningful_variations: 24
    weather_sensitive: false
    description: Slow drinks at a wine bar, then somewhere that does shared plates nearby.
    stops:
      - type: wine_bar
      - type: restaurant

  - id: comedy_night
    title: Comedy night
    vibe: [nightlife, casual]
    time_of_day: night
    duration_hours: 3.5
    meaningful_variations: 4
    weather_sensitive: false
    description: Casual dinner first, then a comedy club, then one last drink.
    stops:
      - type: casual_restaurant
      - type: comedy_club
      - type: bar

  - id: live_music_and_late_drinks
    title: Live music and late drinks
    vibe: [nightlife, romantic]
    time_of_day: night
    duration_hours: 4
    meaningful_variations: 14
    weather_sensitive: false
    description: A proper dinner, a live music set, then a last drink somewhere quieter.
    stops:
      - type: restaurant
      - type: live_music_venue
      - type: bar

  # ---------- NIGHT / NIGHTLIFE ----------

  - id: bar_then_harbour_walk
    title: Small bar and a harbour walk
    vibe: [nightlife, romantic, casual]
    time_of_day: night
    duration_hours: 2.5
    meaningful_variations: 16
    weather_sensitive: true
    description: One genuinely good drink, then walk off the noise somewhere with harbour lights.
    stops:
      - type: bar
      - type: harbor_or_pier
        kind: connective
        note: short harbour walk, no second venue required

  - id: dinner_and_dancing
    title: Dinner and dancing
    vibe: [nightlife, romantic]
    time_of_day: night
    duration_hours: 4
    meaningful_variations: 7
    weather_sensitive: false
    description: Dinner with a drink, then somewhere with a dance floor.
    stops:
      - type: restaurant
      - type: dance_hall_or_club

  - id: late_dessert_and_harbour_lights
    title: Late dessert and harbour lights
    vibe: [foodie, romantic, casual]
    time_of_day: night
    duration_hours: 2.5
    meaningful_variations: 12
    weather_sensitive: true
    description: "Keep the night light on logistics: dessert somewhere good, then a waterside wander."
    stops:
      - type: dessert_shop
      - type: harbor_or_pier
        kind: connective
        note: waterfront walk after dessert

  # ---------- ACTIVE / PLAYFUL ----------

  - id: mini_golf_food_bar
    title: Mini golf, casual food, a drink
    vibe: [active, casual, nightlife]
    time_of_day: evening
    duration_hours: 3
    meaningful_variations: 3
    weather_sensitive: false
    description: Low-stakes competitive energy — mini golf, food, one drink after.
    stops:
      - type: mini_golf
      - type: casual_restaurant
      - type: bar

  - id: bowling_burgers_beers
    title: Bowling and a casual dinner
    vibe: [active, casual, nightlife]
    time_of_day: evening
    duration_hours: 3
    meaningful_variations: 5
    weather_sensitive: false
    description: A few bowling games, casual food, and an optional drink if the night still has legs.
    stops:
      - type: bowling_alley
      - type: casual_restaurant
      - type: brewery_or_bar

  - id: arcade_date
    title: Arcade night
    vibe: [active, casual, nerdy]
    time_of_day: evening
    duration_hours: 2.5
    meaningful_variations: 4
    weather_sensitive: false
    description: Arcade together, casual food after, and ice cream on the way home.
    stops:
      - type: arcade
      - type: casual_restaurant
      - type: dessert_shop

  - id: escape_room_and_dinner
    title: Escape room and dinner
    vibe: [active, nerdy, casual]
    time_of_day: evening
    duration_hours: 3.5
    meaningful_variations: 10
    weather_sensitive: false
    description: Solve something together, then talk about it over dinner and a drink.
    stops:
      - type: escape_room
      - type: restaurant
      - type: bar

  - id: amusement_park_evening
    title: Amusement park evening
    vibe: [casual, nightlife, romantic, active]
    time_of_day: evening
    duration_hours: 3.5
    meaningful_variations: 3
    weather_sensitive: true
    description: Dinner nearby, then rides and lights at an amusement park once it gets dark. Supply-constrained — most cities only have one or two amusement parks.
    stops:
      - type: restaurant
      - type: amusement_park

  # ---------- OUTDOORSY / DAY OUT ----------

  - id: lookout_walk_and_picnic
    title: Lookout walk and a picnic
    vibe: [outdoorsy, romantic, active]
    time_of_day: midday
    duration_hours: 3.5
    meaningful_variations: 14
    weather_sensitive: true
    description: Pick up something easy from a bakery, then do a harbour or clifftop walk with a picnic break.
    stops:
      - type: bakery
      - type: boardwalk_or_lookout
        kind: connective
        note: picnic break at a lookout or grassy spot

  - id: beach_day_into_seafood
    title: Beach day into seafood dinner
    vibe: [outdoorsy, romantic, foodie]
    time_of_day: afternoon
    duration_hours: 5
    meaningful_variations: 12
    weather_sensitive: true
    description: Beach in the afternoon, clean up, then seafood dinner as the sun goes down.
    stops:
      - type: beach
      - type: seafood_restaurant

  - id: ferry_day_out
    title: Ferry day out
    vibe: [romantic, outdoorsy, casual]
    time_of_day: midday
    duration_hours: 4
    meaningful_variations: 10
    weather_sensitive: true
    description: Take the ferry as part of the date, eat lunch by the water, then do a short foreshore walk before heading back.
    stops:
      - type: ferry_ride
        kind: connective
        note: ferry is the activity
      - type: casual_restaurant
      - type: harbor_or_pier
        kind: connective
        note: short foreshore walk before heading back

  - id: harbour_island_picnic
    title: Harbour island picnic
    vibe: [romantic, outdoorsy, casual]
    time_of_day: midday
    duration_hours: 4
    meaningful_variations: 3
    weather_sensitive: true
    description: Pick up picnic supplies, ferry out to a harbour island or tucked-away foreshore, picnic with water views, then ferry back. Supply-constrained — most harbour cities only have a handful of ferry-accessible islands.
    stops:
      - type: bakery_or_market
      - type: ferry_ride
        kind: connective
        note: ferry out to a harbour island or quiet foreshore
      - type: harbor_or_pier
        kind: connective
        note: picnic with a water view on the island
      - type: ferry_ride
        kind: connective
        note: return ferry back to the city

  - id: zoo_and_nearby_lunch
    title: Zoo day and a nearby lunch
    vibe: [outdoorsy, casual, romantic, nerdy]
    time_of_day: midday
    duration_hours: 5
    meaningful_variations: 3
    weather_sensitive: true
    description: Wander a zoo together, then lunch somewhere close. Supply-constrained — most cities have only one major zoo.
    stops:
      - type: zoo
      - type: restaurant

  - id: fish_market_and_waterfront_walk
    title: Fish market and a waterfront walk
    vibe: [foodie, casual, romantic]
    time_of_day: midday
    duration_hours: 2.5
    meaningful_variations: 2
    weather_sensitive: true
    description: Pick up oysters, sashimi and whatever's fresh from a seafood/fish market, eat on the deck or a nearby bench, then walk it off along the waterfront. Supply-constrained — few cities have a signature fish market.
    stops:
      - type: fish_market
      - type: harbor_or_pier
        kind: connective
        note: waterfront walk after eating

  # ---------- RAINY DAY / INDOOR ----------

  - id: rainy_day_indoors
    title: Rainy day indoors
    vibe: [casual, nerdy, romantic]
    time_of_day: flexible
    duration_hours: 4
    meaningful_variations: 12
    weather_sensitive: false
    description: Whole afternoon inside — bookstore, coffee, a museum, dinner to end.
    stops:
      - type: bookstore
      - type: cafe
      - type: museum
      - type: restaurant

  - id: dessert_crawl
    title: Dessert crawl
    vibe: [foodie, casual, romantic]
    time_of_day: afternoon
    duration_hours: 2
    meaningful_variations: 16
    weather_sensitive: false
    description: Three small, sweet stops — a pastry, an ice cream, something chocolate.
    stops:
      - type: bakery
      - type: dessert_shop
      - type: dessert_shop
