# Date Night — date templates.
#
# These are location-agnostic sequences ("arcs") a couple might genuinely want
# to go on. They describe the *shape* of the date, not the venues or cities:
# the planning layer fills in concrete places from the enriched candidate pool
# for whichever city is being served.
#
# Templates must be portable. No city names, suburb names, landmark names, or
# restaurant names in this file. If an arc only works in one city, it doesn't
# belong here — it belongs in a city-specific overlay.
#
# Fields per template:
#   id              : stable slug, used by code.
#   title           : short human name.
#   vibe            : one or more vibes from config/date_categories.yaml
#                     (romantic, foodie, nightlife, nerdy, outdoorsy,
#                     active, casual). Used to pick a category allowlist.
#   time_of_day     : morning | midday | afternoon | evening | night | flexible
#   duration_hours  : rough target length, before travel time between stops.
#   meaningful_variations: estimated count of distinct, genuinely good
#                     versions of this arc in a mid-to-large city before
#                     options start feeling samey. Supply-constrained arcs
#                     (a single aquarium, a single amusement park, a small
#                     set of harbour islands) get small counts on purpose —
#                     we'd rather run out of options than generate
#                     near-duplicates.
#   weather_sensitive: true  => at least one stop is outdoors; weather filter
#                               should be applied to this template.
#                     false => indoor end-to-end, weather is a nice-to-have.
#   description     : one-liner for prompt context / UI debugging.
#   stops           : ordered list. Each stop is either a venue stop (a
#                     generic type that maps to one or more Foursquare
#                     categories) or connective tissue (walk / ferry /
#                     picnic / sunset) which the LLM narrates.
#
# Venue stop `type` values are deliberately coarse — the planning layer is
# responsible for picking the specific Foursquare category and the actual
# place. Connective stops have `kind: connective`.
#
# Connective stop types:
#   The RAG retriever hard-codes a set of stop types that are ALWAYS connective,
#   regardless of the `kind` flag: boardwalk_or_lookout, botanical_garden,
#   ferry_ride, harbor_or_pier, park_or_garden, scenic_lookout. These refer to
#   public/landmark spaces that the planner narrates from local knowledge
#   rather than pulling a specific Foursquare row. For documentation clarity,
#   templates should still mark these stops with `kind: connective` so the
#   YAML matches the runtime behaviour.
#
# Compound stop types:
#   `bakery_or_market` means the planner may pick either a bakery (any day) or
#   a farmers/produce market. Markets are usually weekend-morning only, so
#   templates that effectively need the market branch will skew toward
#   weekends; the bakery branch carries the rest of the week.
#   Similarly `brewery_or_bar` picks whichever fits the neighbourhood better.
#
# Seasonal / festival arcs (light festivals, outdoor sculpture shows,
# fireworks nights) are intentionally NOT templates here. They need
# date-range gating the planner doesn't have yet.

templates:

  # ---------- MORNING ----------

  - id: coffee_and_stroll
    title: Coffee and a stroll
    vibe: [casual, romantic]
    time_of_day: morning
    duration_hours: 1.5
    meaningful_variations: 18
    weather_sensitive: true
    description: Slow start — good coffee, then an easy walk somewhere green or along the water.
    stops:
      - type: cafe
      - type: park_or_garden
        kind: connective
        note: leisurely walk, no fixed venue

  - id: pastries_and_waterfront_walk
    title: Pastries and a waterfront wander
    vibe: [foodie, casual, romantic]
    time_of_day: morning
    duration_hours: 2
    meaningful_variations: 14
    weather_sensitive: true
    description: Start with something fresh from a bakery, then stretch the morning out with an easy waterfront walk.
    stops:
      - type: bakery
      - type: harbor_or_pier
        kind: connective
        note: easy waterfront stroll, no fixed venue

  - id: morning_swim_and_breakfast
    title: Morning swim and breakfast
    vibe: [outdoorsy, casual, romantic]
    time_of_day: morning
    duration_hours: 2.5
    meaningful_variations: 12
    weather_sensitive: true
    description: Early swim at the beach or ocean pool, then breakfast at a nearby cafe.
    stops:
      - type: beach
      - type: cafe

  - id: ferry_to_beach_breakfast
    title: Ferry to a beach breakfast
    vibe: [outdoorsy, casual, romantic]
    time_of_day: morning
    duration_hours: 3
    meaningful_variations: 6
    weather_sensitive: true
    description: "Let the ferry be part of the date: cross the harbour, swim or wander by the water, then get breakfast nearby."
    stops:
      - type: ferry_ride
        kind: connective
        note: scenic harbour ferry to a beach or ocean-pool area
      - type: beach
      - type: cafe

  - id: brunch_and_bookstore
    title: Brunch and a bookstore
    vibe: [casual, nerdy, foodie]
    time_of_day: morning
    duration_hours: 2.5
    meaningful_variations: 10
    weather_sensitive: false
    description: Long brunch, then browse a bookstore together and each pick something for the other.
    stops:
      - type: brunch_restaurant
      - type: bookstore

  # ---------- MIDDAY / AFTERNOON ----------

  - id: coastal_walk_and_lunch
    title: Coastal walk and lunch
    vibe: [outdoorsy, romantic, casual]
    time_of_day: midday
    duration_hours: 3
    meaningful_variations: 12
    weather_sensitive: true
    description: Walk a coastal path or foreshore boardwalk, then settle into a long lunch nearby.
    stops:
      - type: boardwalk_or_lookout
        kind: connective
        note: coastal/foreshore walk
      - type: casual_restaurant

  - id: gallery_and_wine_bar
    title: Gallery and wine bar
    vibe: [romantic, nerdy]
    time_of_day: afternoon
    duration_hours: 2.5
    meaningful_variations: 9
    weather_sensitive: false
    description: Drift through an art gallery, then unwind over a glass of wine nearby.
    stops:
      - type: art_gallery
      - type: wine_bar

  - id: garden_gallery_aperitivo
    title: Garden, gallery, aperitivo
    vibe: [romantic, nerdy, outdoorsy]
    time_of_day: afternoon
    duration_hours: 3.5
    meaningful_variations: 3
    weather_sensitive: true
    description: Start with a botanical garden walk, drift into an art gallery nearby, then finish with a low-key glass of wine. Needs a walkable garden-gallery cluster, which most cities only have in one or two spots.
    stops:
      - type: botanical_garden
        kind: connective
        note: slow garden walk before the gallery
      - type: art_gallery
      - type: wine_bar

  - id: museum_coffee_bookstore
    title: Museum, coffee, bookstore
    vibe: [nerdy, casual, romantic]
    time_of_day: afternoon
    duration_hours: 3.5
    meaningful_variations: 5
    weather_sensitive: false
    description: A thinking afternoon — museum exhibit, proper coffee, and a slow bookstore finish.
    stops:
      - type: museum
      - type: cafe
      - type: bookstore

  - id: botanical_picnic
    title: Botanical garden picnic
    vibe: [romantic, outdoorsy]
    time_of_day: afternoon
    duration_hours: 2.5
    meaningful_variations: 5
    weather_sensitive: true
    description: Grab picnic bits, find a good patch of grass in a garden, and finish with something sweet.
    stops:
      - type: bakery
      - type: botanical_garden
        kind: connective
        note: picnic on the grass
      - type: dessert_shop

  - id: aquarium_and_harbour
    title: Aquarium and harbour walk
    vibe: [nerdy, romantic, casual]
    time_of_day: afternoon
    duration_hours: 3
    meaningful_variations: 2
    weather_sensitive: true
    description: Wander an aquarium, then a slow loop around the harbour with coffee in hand.
    stops:
      - type: aquarium
      - type: cafe
      - type: harbor_or_pier
        kind: connective
        note: harbour walk

  - id: cafe_bookstore_dessert
    title: Cafe, bookstore, dessert
    vibe: [casual, romantic]
    time_of_day: afternoon
    duration_hours: 2.5
    meaningful_variations: 12
    weather_sensitive: false
    description: Coffee, a shared bookstore detour, then somewhere sweet to finish.
    stops:
      - type: cafe
      - type: bookstore
      - type: dessert_shop

  # ---------- SUNSET / GOLDEN HOUR ----------

  - id: sunset_lookout_and_dinner
    title: Sunset lookout, then dinner
    vibe: [romantic, outdoorsy]
    time_of_day: evening
    duration_hours: 3.5
    meaningful_variations: 16
    weather_sensitive: true
    description: Catch the sunset from a scenic lookout, then a proper dinner after dark.
    stops:
      - type: scenic_lookout
        kind: connective
        note: sunset from a scenic lookout
      - type: restaurant

  - id: sunset_picnic
    title: Sunset picnic
    vibe: [romantic, outdoorsy]
    time_of_day: evening
    duration_hours: 2
    meaningful_variations: 14
    weather_sensitive: true
    description: Pick up simple picnic supplies, find a good view, and watch the sun go down.
    stops:
      - type: bakery_or_market
      - type: scenic_lookout
        kind: connective
        note: sunset picnic

  - id: sunset_ferry_and_dinner
    title: Sunset ferry, then dinner
    vibe: [romantic, outdoorsy, foodie]
    time_of_day: evening
    duration_hours: 3.5
    meaningful_variations: 10
    weather_sensitive: true
    description: Use a short ferry ride as the scenic opener, then head to dinner once it gets dark.
    stops:
      - type: ferry_ride
        kind: connective
        note: short harbour ferry for the view
      - type: restaurant

  - id: rooftop_then_dinner
    title: Rooftop drinks, then dinner
    vibe: [romantic, nightlife, foodie]
    time_of_day: evening
    duration_hours: 3.5
    meaningful_variations: 12
    weather_sensitive: true
    description: Start the night with a drink somewhere with a view, roll into dinner once the light drops.
    stops:
      - type: rooftop_bar
      - type: restaurant

  # ---------- EVENING / DINNER ----------

  - id: drinks_dinner_dessert
    title: Drinks, dinner, dessert
    vibe: [romantic, foodie]
    time_of_day: evening
