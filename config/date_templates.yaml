# Date Night — date templates.
#
# These are Sydney-first sequences ("arcs") a couple might genuinely want to
# go on. They should feel plausible for Sydney without being so specific that
# they only work for one suburb, one weekend market, or one unusually niche
# kind of date. They describe the *shape* of the date, not the venues: the
# planning layer fills in concrete Foursquare places from the enriched
# candidate pool.
#
# Fields per template:
#   id              : stable slug, used by code.
#   title           : short human name.
#   vibe            : one or more vibes from config/date_categories.yaml
#                     (romantic, foodie, nightlife, nerdy, outdoorsy,
#                     active, casual). Used to pick a category allowlist.
#   time_of_day     : morning | midday | afternoon | evening | night | flexible
#   duration_hours  : rough target length, before travel time between stops.
#   weather_sensitive: true  => at least one stop is outdoors; weather filter
#                               should be applied to this template.
#                     false => indoor end-to-end, weather is a nice-to-have.
#   description     : one-liner for prompt context / UI debugging.
#   stops           : ordered list. Each stop is either a venue stop (a
#                     generic type that maps to one or more Foursquare
#                     categories) or connective tissue (walk / ferry /
#                     picnic / sunset) which the LLM narrates.
#
# Venue stop `type` values are deliberately coarse — the planning layer is
# responsible for picking the specific Foursquare category and the actual
# place. Connective stops have `kind: connective`.

templates:

  # ---------- MORNING ----------

  - id: coffee_and_stroll
    title: Coffee and a stroll
    vibe: [casual, romantic]
    time_of_day: morning
    duration_hours: 1.5
    weather_sensitive: true
    description: Slow start — good coffee, then an easy walk somewhere green or along the water.
    stops:
      - type: cafe
      - type: park_or_garden
        kind: connective
        note: leisurely walk, no fixed venue

  - id: pastries_and_waterfront_walk
    title: Pastries and a waterfront wander
    vibe: [foodie, casual, romantic]
    time_of_day: morning
    duration_hours: 2
    weather_sensitive: true
    description: Start with something fresh from a bakery, then stretch the morning out with an easy waterfront walk.
    stops:
      - type: bakery
      - type: harbor_or_pier
        kind: connective
        note: easy waterfront stroll, no fixed venue

  - id: morning_swim_and_breakfast
    title: Morning swim and breakfast
    vibe: [outdoorsy, casual, romantic]
    time_of_day: morning
    duration_hours: 2.5
    weather_sensitive: true
    description: Early swim at the beach or ocean pool, then breakfast at a nearby cafe.
    stops:
      - type: beach
      - type: cafe

  - id: brunch_and_bookstore
    title: Brunch and a bookstore
    vibe: [casual, nerdy, foodie]
    time_of_day: morning
    duration_hours: 2.5
    weather_sensitive: false
    description: Long brunch, then browse a bookstore together and each pick something for the other.
    stops:
      - type: brunch_restaurant
      - type: bookstore

  # ---------- MIDDAY / AFTERNOON ----------

  - id: coastal_walk_and_lunch
    title: Coastal walk and lunch
    vibe: [outdoorsy, romantic, casual]
    time_of_day: midday
    duration_hours: 3
    weather_sensitive: true
    description: Walk a coastal path or foreshore boardwalk, then settle into a long lunch nearby.
    stops:
      - type: boardwalk_or_lookout
      - type: casual_restaurant

  - id: gallery_and_wine_bar
    title: Gallery and wine bar
    vibe: [romantic, nerdy]
    time_of_day: afternoon
    duration_hours: 2.5
    weather_sensitive: false
    description: Drift through an art gallery, then unwind over a glass of wine nearby.
    stops:
      - type: art_gallery
      - type: wine_bar

  - id: museum_coffee_bookstore
    title: Museum, coffee, bookstore
    vibe: [nerdy, casual, romantic]
    time_of_day: afternoon
    duration_hours: 3.5
    weather_sensitive: false
    description: A thinking afternoon — museum exhibit, proper coffee, and a slow bookstore finish.
    stops:
      - type: museum
      - type: cafe
      - type: bookstore

  - id: botanical_picnic
    title: Botanical garden picnic
    vibe: [romantic, outdoorsy]
    time_of_day: afternoon
    duration_hours: 2.5
    weather_sensitive: true
    description: Grab picnic bits, find a good patch of grass in a garden, and finish with something sweet.
    stops:
      - type: bakery
      - type: botanical_garden
        kind: connective
        note: picnic on the grass
      - type: dessert_shop

  - id: aquarium_and_harbour
    title: Aquarium and harbour walk
    vibe: [nerdy, romantic, casual]
    time_of_day: afternoon
    duration_hours: 3
    weather_sensitive: true
    description: Wander an aquarium, then a slow loop around the harbour with coffee in hand.
    stops:
      - type: aquarium
      - type: cafe
      - type: harbor_or_pier
        kind: connective
        note: harbour walk

  - id: cafe_bookstore_dessert
    title: Cafe, bookstore, dessert
    vibe: [casual, romantic]
    time_of_day: afternoon
    duration_hours: 2.5
    weather_sensitive: false
    description: Coffee, a shared bookstore detour, then somewhere sweet to finish.
    stops:
      - type: cafe
      - type: bookstore
      - type: dessert_shop

  # ---------- SUNSET / GOLDEN HOUR ----------

  - id: sunset_lookout_and_dinner
    title: Sunset lookout, then dinner
    vibe: [romantic, outdoorsy]
    time_of_day: evening
    duration_hours: 3.5
    weather_sensitive: true
    description: Catch the sunset from a scenic lookout, then a proper dinner after dark.
    stops:
      - type: scenic_lookout
      - type: restaurant

  - id: sunset_picnic
    title: Sunset picnic
    vibe: [romantic, outdoorsy]
    time_of_day: evening
    duration_hours: 2
    weather_sensitive: true
    description: Pick up simple picnic supplies, find a good view, and watch the sun go down.
    stops:
      - type: bakery_or_market
      - type: scenic_lookout
        kind: connective
        note: sunset picnic

  - id: sunset_ferry_and_dinner
    title: Sunset ferry, then dinner
    vibe: [romantic, outdoorsy, foodie]
    time_of_day: evening
    duration_hours: 3.5
    weather_sensitive: true
    description: Use a short ferry ride as the scenic opener, then head to dinner once it gets dark.
    stops:
      - type: ferry_ride
        kind: connective
        note: short harbour ferry for the view
      - type: restaurant

  - id: rooftop_then_dinner
    title: Rooftop drinks, then dinner
    vibe: [romantic, nightlife, foodie]
    time_of_day: evening
    duration_hours: 3.5
    weather_sensitive: true
    description: Start the night with a drink somewhere with a view, roll into dinner once the light drops.
    stops:
      - type: rooftop_bar
      - type: restaurant

  # ---------- EVENING / DINNER ----------

  - id: drinks_dinner_dessert
    title: Drinks, dinner, dessert
    vibe: [romantic, foodie]
    time_of_day: evening
    duration_hours: 4
    weather_sensitive: false
    description: The classic — pre-dinner drinks, a proper dinner, a walk to somewhere sweet.
    stops:
      - type: cocktail_bar
      - type: restaurant
      - type: dessert_shop

  - id: dinner_and_dessert_walk
    title: Dinner and a dessert walk
    vibe: [romantic, casual, foodie]
    time_of_day: evening
    duration_hours: 2.5
    weather_sensitive: true
    description: A good dinner, then walk somewhere for dessert rather than staying at the table.
    stops:
      - type: restaurant
      - type: dessert_shop

  - id: pre_theatre_dinner_and_show
    title: Pre-theatre dinner and a show
    vibe: [romantic, nerdy]
    time_of_day: evening
    duration_hours: 4
    weather_sensitive: false
    description: Early dinner, then a performance — theatre, ballet, symphony, whatever's playing.
    stops:
      - type: restaurant
      - type: performing_arts_venue

  - id: dinner_and_a_movie
    title: Dinner and a movie
    vibe: [casual, romantic]
    time_of_day: evening
    duration_hours: 4
    weather_sensitive: false
    description: Casual dinner, then a cinema — old-school for a reason.
    stops:
      - type: casual_restaurant
      - type: movie_theater

  - id: wine_bar_and_shared_plates
    title: Wine bar and shared plates
    vibe: [romantic, foodie]
    time_of_day: evening
    duration_hours: 3
    weather_sensitive: false
    description: Slow drinks at a wine bar, then somewhere that does shared plates nearby.
    stops:
      - type: wine_bar
      - type: restaurant

  - id: comedy_night
    title: Comedy night
    vibe: [nightlife, casual]
    time_of_day: night
    duration_hours: 3.5
    weather_sensitive: false
    description: Casual dinner first, then a comedy club, then one last drink.
    stops:
      - type: casual_restaurant
      - type: comedy_club
      - type: bar

  - id: live_music_and_late_drinks
    title: Live music and late drinks
    vibe: [nightlife, romantic]
    time_of_day: night
    duration_hours: 4
    weather_sensitive: false
    description: A proper dinner, a live music set, then a last drink somewhere quieter.
    stops:
      - type: restaurant
      - type: live_music_venue
      - type: bar

  # ---------- NIGHT / NIGHTLIFE ----------

  - id: bar_then_harbour_walk
    title: Small bar and a harbour walk
    vibe: [nightlife, romantic, casual]
    time_of_day: night
    duration_hours: 2.5
    weather_sensitive: true
    description: One genuinely good drink, then walk off the noise somewhere with harbour lights.
    stops:
      - type: bar
      - type: harbor_or_pier
        kind: connective
        note: short harbour walk, no second venue required

  - id: dinner_and_dancing
    title: Dinner and dancing
    vibe: [nightlife, romantic]
    time_of_day: night
    duration_hours: 4
    weather_sensitive: false
    description: Dinner with a drink, then somewhere with a dance floor.
    stops:
