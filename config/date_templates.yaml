      - type: restaurant
      - type: dessert_shop

  - id: dinner_and_dessert_walk
    title: Dinner and a dessert walk
    vibe: [romantic, casual, foodie]
    time_of_day: evening
    duration_hours: 2.5
    meaningful_variations: 28
    weather_sensitive: true
    description: A good dinner, then walk somewhere for dessert rather than staying at the table.
    stops:
      - type: restaurant
