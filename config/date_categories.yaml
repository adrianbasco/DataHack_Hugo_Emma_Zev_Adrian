# Date Night — Foursquare category allowlist, grouped by "vibe".
#
# This file is the minimal set of Foursquare categories needed to cover every
# template in config/date_templates.yaml. Each entry is the FULL PATH label of
# a Foursquare category (e.g. "Dining and Drinking > Restaurant") and matches
# the `category_label` column of data/categories.parquet exactly.
#
# The builder (`back_end/catalog/categories.py`) expands each path to include
# ALL descendants in the Foursquare taxonomy. So listing
# "Dining and Drinking > Restaurant" automatically includes Italian, Thai,
# Brazilian, etc.
#
# An unknown path here is a FATAL error — the loader refuses to run. This is
# intentional: we'd rather fail loudly than silently drop vibes.
#
# How this file was derived:
#   - Every stop type across every template in date_templates.yaml was mapped
#     to one or more Foursquare category paths.
#   - Each vibe below lists exactly the union of paths required by templates
#     tagged with that vibe. Nothing more.
#   - Connective stops with `note: no fixed venue` (pure narration) are not
#     counted — they don't need candidates from the pool.
#
# Vibes available: romantic, foodie, nightlife, nerdy, outdoorsy, active, casual.
# The master "date-worthy" set is the union of all vibes.

vibes:

  # Templates: coffee_and_stroll, morning_swim_and_breakfast, coastal_walk_and_lunch,
  # gallery_and_wine_bar, museum_coffee_bookstore, botanical_picnic,
  # aquarium_and_harbour, cafe_bookstore_dessert, farmers_market_cook_at_home,
  # sunset_lookout_and_dinner, sunset_picnic, rooftop_then_dinner,
  # drinks_dinner_dessert, dinner_and_dessert_walk, pre_theatre_dinner_and_show,
  # dinner_and_a_movie, wine_bar_and_shared_plates, live_music_and_late_drinks,
  # cocktail_crawl, dinner_and_dancing, hike_and_picnic, beach_day_into_seafood,
  # ferry_day_out, rainy_day_indoors, dessert_crawl.
