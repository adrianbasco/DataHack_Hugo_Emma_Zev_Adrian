# Date Night — Foursquare category allowlist, grouped by "vibe".
#
# Each entry under a vibe is the FULL PATH label of a Foursquare category
# (e.g. "Dining and Drinking > Restaurant"). These paths match the
# `category_label` column of data/categories.parquet exactly.
#
# The builder (back_end/date_night/categories.py) expands each path to
# include ALL descendants in the Foursquare taxonomy. So listing
# "Dining and Drinking > Restaurant" automatically includes Italian,
# Thai, Brazilian, etc.
#
# An unknown path here is a FATAL error — the loader refuses to run.
# This is intentional: we'd rather fail loudly than silently drop vibes.
#
# Vibes available: romantic, foodie, nightlife, nerdy, outdoorsy, active, casual.
# The master "date-worthy" set is the union of all vibes.

